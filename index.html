<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Count Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header class="fade-in">
            <h1>Sample Analysis Dashboard</h1>
            <p class="subtitle">Tracking monthly sample counts from 2022 to 2026</p>
        </header>

        <nav class="nav-tabs fade-in" id="year-nav">
            <!-- Tabs will be injected here -->
        </nav>

        <main class="dashboard-grid fade-in">
            <div class="card">
                <h3>Monthly Total Trends</h3>
                <div class="chart-container">
                    <canvas id="monthlyTotalChart"></canvas>
                </div>
            </div>

            <div class="card">
                <h3>Test Distribution</h3>
                <div class="chart-container">
                    <canvas id="testPieChart"></canvas>
                </div>
            </div>

            <div class="card">
                <div class="filter-bar">
                    <div class="filter-group">
                        <label for="year-filter">Year</label>
                        <select id="year-filter"></select>
                    </div>
                    <div class="filter-group">
                        <label for="month-filter">Month</label>
                        <select id="month-filter">
                            <option value="all">All Months</option>
                            <option value="0">Jan</option><option value="1">Feb</option><option value="2">Mar</option>
                            <option value="3">Apr</option><option value="4">May</option><option value="5">Jun</option>
                            <option value="6">Jul</option><option value="7">Aug</option><option value="8">Sep</option>
                            <option value="9">Oct</option><option value="10">Nov</option><option value="11">Dec</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label for="test-filter">Test Type</label>
                        <select id="test-filter">
                            <option value="all">All Tests</option>
                        </select>
                    </div>
                </div>
                <h2 id="table-title">Detailed Monthly Breakdown</h2>
                <div class="table-container" id="table-view">
                    <!-- Tables will be injected here -->
                </div>
            </div>
        </main>
    </div>

    <script src="script.js?v=2.0"></script>
</body>
</html>
